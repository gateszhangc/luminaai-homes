<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <rect width="480" height="120" rx="16" fill="#0a0a0a"/>
  <!-- Lumina prism / light crystal -->
  <polygon points="48,28 72,28 84,52 72,76 48,76 36,52" fill="#6366f1" opacity="0.9"/>
  <polygon points="48,32 68,32 78,52 68,72 48,72 38,52" fill="#818cf8" opacity="0.7"/>
  <polygon points="52,38 64,38 70,52 64,66 52,66 46,52" fill="#c7d2fe" opacity="0.5"/>
  <!-- Light rays -->
  <line x1="84" y1="40" x2="100" y2="30" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="84" y1="52" x2="104" y2="52" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="84" y1="64" x2="100" y2="74" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <!-- Sparkle dots -->
