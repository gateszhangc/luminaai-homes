  <circle cx="96" cy="44" r="1.5" fill="#a5b4fc" opacity="0.6"/>
  <circle cx="92" cy="70" r="1.5" fill="#a5b4fc" opacity="0.6"/>
  <!-- Text -->
  <text x="116" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9" letter-spacing="-0.01em">Lumina</text>
  <text x="116" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8" letter-spacing="0.04em">AI CREATIVE PLATFORM</text>
  <text x="116" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b" font-style="italic">Seedream · Seedance</text>
</svg>
